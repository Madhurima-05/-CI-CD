<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IARE | Secure Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-bg">
    <div class="glass-login">
        <div class="logo-area">
            <div class="logo-circle">IARE</div>
            <h2>DevOps Portal</h2>
        </div>
        <div class="auth-form">
            <div class="input-wrapper">
                <i data-lucide="user"></i>
                <input type="text" id="username" placeholder="Roll Number">
            </div>
            <div class="input-wrapper">
                <i data-lucide="lock"></i>
                <input type="password" id="password" placeholder="Password">
            </div>
            <button onclick="handleLogin()" class="btn-primary">
                Explore Dashboard <i data-lucide="arrow-right"></i>
            </button>
        </div>
    </div>
    <script>
        lucide.createIcons();
        function handleLogin() {
            if(document.getElementById('username').value === "23951A0521") {
                window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
