<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IARE Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-bg">
    <div class="glass-login">
        <div class="logo-area">
            <div class="logo-circle">IARE</div>
            <h2>DevOps Portal</h2>
        </div>
        <div class="auth-form">
            <div class="input-wrapper">
                <i data-lucide="user"></i>
                <input type="text" id="username" placeholder="Roll Number (24951a05h0)">
            </div>
            <div class="input-wrapper">
                <i data-lucide="lock"></i>
                <input type="password" id="password" placeholder="Password (1234)">
            </div>
            <button type="button" onclick="handleLogin()" class="btn-primary">
                Explore Dashboard <i data-lucide="arrow-right"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
